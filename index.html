<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eran - Expense Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 16px;
            margin-bottom: 16px;
        }

        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .status {
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .status.loading {
            background: #fef3c7;
            color: #92400e;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            flex: 1;
            min-width: 100px;
            justify-content: center;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-add {
            background: #22c55e;
        }

        .btn-save {
            background: #3b82f6;
        }

        .btn-send {
            background: #9333ea;
        }

        .btn-delete {
            background: #ef4444;
            padding: 6px 10px;
            flex: none;
            min-width: auto;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 16px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            background: white;
        }

        th, td {
            padding: 10px 8px;
            border: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            font-size: 14px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 16px;
        }

        input[type="date"] {
            min-width: 130px;
        }

        input[type="number"] {
            min-width: 90px;
        }

        .totals {
            background: white;
            padding: 16px;
            border-radius: 8px;
        }

        .totals h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .grand-total {
            font-weight: bold;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid #e5e7eb;
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state p {
            margin-top: 8px;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .card {
                padding: 12px;
            }

            h1 {
                font-size: 20px;
            }

            th, td {
                padding: 8px 4px;
                font-size: 13px;
            }

            input {
                padding: 6px;
                font-size: 16px;
            }

            button {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Eran - Expense Tracker</h1>
        
        <div id="status" class="status" style="display: none;"></div>

        <div class="button-group">
            <button class="btn-add" onclick="app.addRow()" id="addBtn">
                ➕ Add Row
            </button>
            <button class="btn-save" onclick="app.saveData()" id="saveBtn" disabled>
                💾 Save
            </button>
            <button class="btn-send" onclick="app.sendEmail()" id="sendBtn">
                📧 Send
            </button>
        </div>

        <div class="table-container">
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>House</th>
                        <th>Done</th>
                        <th>All</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" class="empty-state">
                            <div>📋</div>
                            <p>No expenses yet. Click "Add Row" to start tracking.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="totals" class="totals" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Expense Tracker App
        const app = (() => {
            // Supabase Configuration
            const SUPABASE_URL = 'YOUR_SUPABASE_URL';
            const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
            
            let dbClient = null;
            let expenses = [];
            let hasUnsavedChanges = false;

            // Initialize Supabase client
            try {
                if (SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_KEY !== 'YOUR_SUPABASE_ANON_KEY') {
                    dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch (error) {
                console.warn('Supabase not configured, using localStorage only');
            }

            // Show status message
            function showStatus(message, type) {
                const statusDiv = document.getElementById('status');
                statusDiv.textContent = message;
                statusDiv.className = `status ${type}`;
                statusDiv.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                }
            }

            // Load data from Supabase or localStorage
            async function loadData() {
                try {
                    if (dbClient) {
                        showStatus('Loading data...', 'loading');
                        
                        const { data, error } = await dbClient
                            .from('expenses')
                            .select('*')
                            .order('date', { ascending: false });

                        if (error) throw error;

                        expenses = data || [];
                        showStatus('Data loaded successfully!', 'success');
                    } else {
                        // Use localStorage only
                        const savedData = localStorage.getItem('expenseData');
                        if (savedData) {
                            expenses = JSON.parse(savedData);
                        }
                        showStatus('Using offline mode', 'loading');
                    }
                    
                    renderTable();
                    hasUnsavedChanges = false;
                    updateSaveButton();
                } catch (error) {
                    console.error('Error loading data:', error);
                    showStatus('Error loading data. Using offline mode.', 'error');
                    
                    // Fallback to localStorage
                    const savedData = localStorage.getItem('expenseData');
                    if (savedData) {
                        expenses = JSON.parse(savedData);
                        renderTable();
                    }
                }
            }

            // Save data to Supabase and localStorage
            async function saveData() {
                try {
                    showStatus('Saving data...', 'loading');
                    document.getElementById('saveBtn').disabled = true;

                    if (dbClient) {
                        // Delete all existing records
                        const { error: deleteError } = await dbClient
                            .from('expenses')
                            .delete()
                            .neq('id', 0);

                        if (deleteError) throw deleteError;

                        // Insert all current data
                        if (expenses.length > 0) {
                            const dataToInsert = expenses.map(row => ({
                                date: row.date || null,
                                house: Number(row.house) || 0,
                                done: Number(row.done) || 0
                            }));

                            const { error: insertError } = await dbClient
                                .from('expenses')
                                .insert(dataToInsert);

                            if (insertError) throw insertError;
                        }
                    }

                    // Always save to localStorage as backup
                    localStorage.setItem('expenseData', JSON.stringify(expenses));

                    showStatus('Data saved successfully!', 'success');
                    hasUnsavedChanges = false;
                    updateSaveButton();
                    
                    if (dbClient) {
                        await loadData(); // Reload to get server IDs
                    }
                } catch (error) {
                    console.error('Error saving data:', error);
                    showStatus('Error saving to cloud. Saved locally instead.', 'error');
                    localStorage.setItem('expenseData', JSON.stringify(expenses));
                    document.getElementById('saveBtn').disabled = false;
                }
            }

            // Add new row with default house value of 400
            function addRow() {
                const today = new Date().toISOString().split('T')[0];
                expenses.unshift({ date: today, house: '400', done: '' });
                renderTable();
                markAsChanged();
            }

            // Delete row
            function deleteRow(index) {
                if (confirm('Are you sure you want to delete this row?')) {
                    expenses.splice(index, 1);
                    renderTable();
                    markAsChanged();
                }
            }

            // Update value
            function updateValue(index, field, value) {
                expenses[index][field] = value;
                renderTable();
                markAsChanged();
            }

            // Mark data as changed
            function markAsChanged() {
                hasUnsavedChanges = true;
                updateSaveButton();
            }

            // Update save button state
            function updateSaveButton() {
                const saveBtn = document.getElementById('saveBtn');
                saveBtn.disabled = !hasUnsavedChanges;
                saveBtn.textContent = hasUnsavedChanges ? '💾 Save *' : '💾 Save';
            }

            // Calculate total for a row
            function calculateTotal(row) {
                return (Number(row.house) || 0) + (Number(row.done) || 0);
            }

            // Render table
            function renderTable() {
                const tbody = document.getElementById('tableBody');
                
                if (expenses.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="empty-state">
                                <div>📋</div>
                                <p>No expenses yet. Click "Add Row" to start tracking.</p>
                            </td>
                        </tr>
                    `;
                    document.getElementById('totals').style.display = 'none';
                    return;
                }

                tbody.innerHTML = '';

                expenses.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <input type="date" 
                                value="${row.date || ''}" 
                                onchange="app.updateValue(${index}, 'date', this.value)">
                        </td>
                        <td>
                            <input type="number" 
                                value="${row.house || ''}" 
                                onchange="app.updateValue(${index}, 'house', this.value)">
                        </td>
                        <td>
                            <input type="number" 
                                value="${row.done || ''}" 
                                onchange="app.updateValue(${index}, 'done', this.value)">
                        </td>
                        <td>${calculateTotal(row)}</td>
                        <td>
                            <button class="btn-delete" onclick="app.deleteRow(${index})">🗑️</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                renderTotals();
            }

            // Render totals
            function renderTotals() {
                const totalsDiv = document.getElementById('totals');
                const monthlyTotals = {};
                let grandTotal = 0;

                expenses.forEach(row => {
                    if (row.date) {
                        const date = new Date(row.date + 'T00:00:00');
                        const month = date.toLocaleString('default', { month: 'long', year: 'numeric' });
                        const rowTotal = calculateTotal(row);
                        monthlyTotals[month] = (monthlyTotals[month] || 0) + rowTotal;
                        grandTotal += rowTotal;
                    }
                });

                if (Object.keys(monthlyTotals).length === 0) {
                    totalsDiv.style.display = 'none';
                    return;
                }

                totalsDiv.style.display = 'block';
                let totalsHTML = '<h3>Monthly Totals:</h3>';
                
                Object.entries(monthlyTotals)
                    .sort((a, b) => new Date(a[0]) - new Date(b[0]))
                    .forEach(([month, total]) => {
                        totalsHTML += `
                            <div class="total-row">
                                <span>${month}:</span>
                                <span>${total.toFixed(0)}</span>
                            </div>
                        `;
                    });

                totalsHTML += `
                    <div class="total-row grand-total">
                        <span>Grand Total:</span>
                        <span>${grandTotal.toFixed(0)}</span>
                    </div>
                `;

                totalsDiv.innerHTML = totalsHTML;
            }

            // Send email
            function sendEmail() {
                const csvContent = 'Date,House,Done,Total\n' + expenses.map(row => 
                    `${row.date},${row.house},${row.done},${calculateTotal(row)}`
                ).join('\n');
                
                const subject = 'Expense Sheet Data - ' + new Date().toLocaleDateString();
                const body = 'Please find the expense data below:\n\n' + csvContent;
                const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailtoLink;
            }

            // Warn before leaving with unsaved changes
            window.addEventListener('beforeunload', (e) => {
                if (hasUnsavedChanges) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });

            // Initialize the app
            loadData();

            // Public API
            return {
                addRow,
                deleteRow,
                updateValue,
                saveData,
                sendEmail
            };
        })();
    </script>
</body>
</html>
