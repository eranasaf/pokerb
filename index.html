!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ערן - מעקב הוצאות</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 16px;
            margin-bottom: 16px;
        }

        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 20px;
            font-size: 24px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .status {
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .status.loading {
            background: #fef3c7;
            color: #92400e;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            flex: 1;
            min-width: 100px;
            justify-content: center;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-add {
            background: #22c55e;
        }

        .btn-save {
            background: #3b82f6;
        }

        .btn-send {
            background: #9333ea;
        }

        .btn-chart {
            background: #f59e0b;
        }

        .btn-delete {
            background: #ef4444;
            padding: 6px 10px;
            flex: none;
            min-width: auto;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 16px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            background: white;
        }

        th, td {
            padding: 10px 8px;
            border: 1px solid #e5e7eb;
            text-align: right;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            font-size: 14px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 16px;
            text-align: right;
        }

        input[type="date"] {
            min-width: 130px;
        }

        input[type="number"] {
            min-width: 90px;
        }

        .totals {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .totals h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .grand-total {
            font-weight: bold;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid #e5e7eb;
            font-size: 18px;
        }

        .year-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #3b82f6;
        }

        .year-total {
            background: #dbeafe;
            color: #1e40af;
            font-weight: bold;
            font-size: 20px;
            padding: 12px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state p {
            margin-top: 8px;
            font-size: 14px;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }

        .chart-canvas {
            max-width: 100%;
            height: 300px;
        }

        .year-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .year-btn {
            background: #6b7280;
            padding: 8px 16px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .year-btn.active {
            background: #3b82f6;
        }

        .negative {
            color: #ef4444;
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .card {
                padding: 12px;
            }

            h1 {
                font-size: 20px;
            }

            h2 {
                font-size: 18px;
            }

            th, td {
                padding: 8px 4px;
                font-size: 13px;
            }

            input {
                padding: 6px;
                font-size: 16px;
            }

            button {
                padding: 8px 12px;
                font-size: 13px;
            }

            .chart-canvas {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>ערן - מעקב הוצאות</h1>
        
        <div id="status" class="status" style="display: none;"></div>

        <div class="button-group">
            <button class="btn-add" onclick="app.addRow()" id="addBtn">
                ➕ הוסף שורה
            </button>
            <button class="btn-save" onclick="app.saveData()" id="saveBtn" disabled>
                💾 שמור
            </button>
            <button class="btn-chart" onclick="app.toggleChart()" id="chartBtn">
                📊 גרף
            </button>
            <button class="btn-send" onclick="app.sendEmail()" id="sendBtn">
                📧 שלח
            </button>
        </div>

        <div id="chartContainer" class="chart-container">
            <h2>גרף חודשי</h2>
            <div class="year-selector" id="yearSelector"></div>
            <canvas id="monthlyChart" class="chart-canvas"></canvas>
        </div>

        <div class="table-container">
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th>פעולה</th>
                        <th>סה"כ</th>
                        <th>בוצע</th>
                        <th>בית</th>
                        <th>תאריך</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" class="empty-state">
                            <div>📋</div>
                            <p>אין הוצאות עדיין. לחץ "הוסף שורה" כדי להתחיל.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="totals" class="totals" style="display: none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // Expense Tracker App
        const app = (() => {
            // Supabase Configuration
            const SUPABASE_URL = 'YOUR_SUPABASE_URL';
            const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
            
            let dbClient = null;
            let expenses = [];
            let hasUnsavedChanges = false;
            let chartInstance = null;
            let chartVisible = false;
            let selectedYear = new Date().getFullYear();

            // Initialize Supabase client
            try {
                if (SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_KEY !== 'YOUR_SUPABASE_ANON_KEY') {
                    dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                }
            } catch (error) {
                console.warn('Supabase not configured, using localStorage only');
            }

            // Show status message
            function showStatus(message, type) {
                const statusDiv = document.getElementById('status');
                statusDiv.textContent = message;
                statusDiv.className = `status ${type}`;
                statusDiv.style.display = 'block';
                
                if (type === 'success') {
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                }
            }

            // Load data from Supabase or localStorage
            async function loadData() {
                try {
                    if (dbClient) {
                        showStatus('טוען נתונים...', 'loading');
                        
                        const { data, error } = await dbClient
                            .from('expenses')
                            .select('*')
                            .order('date', { ascending: false });

                        if (error) throw error;

                        expenses = data || [];
                        showStatus('הנתונים נטענו בהצלחה!', 'success');
                    } else {
                        // Use localStorage only
                        const savedData = localStorage.getItem('expenseData');
                        if (savedData) {
                            expenses = JSON.parse(savedData);
                        }
                        showStatus('משתמש במצב לא מקוון', 'loading');
                    }
                    
                    renderTable();
                    hasUnsavedChanges = false;
                    updateSaveButton();
                } catch (error) {
                    console.error('Error loading data:', error);
                    showStatus('שגיאה בטעינת נתונים. משתמש במצב לא מקוון.', 'error');
                    
                    // Fallback to localStorage
                    const savedData = localStorage.getItem('expenseData');
                    if (savedData) {
                        expenses = JSON.parse(savedData);
                        renderTable();
                    }
                }
            }

            // Save data to Supabase and localStorage
            async function saveData() {
                try {
                    showStatus('שומר נתונים...', 'loading');
                    document.getElementById('saveBtn').disabled = true;

                    if (dbClient) {
                        // Delete all existing records
                        const { error: deleteError } = await dbClient
                            .from('expenses')
                            .delete()
                            .neq('id', 0);

                        if (deleteError) throw deleteError;

                        // Insert all current data
                        if (expenses.length > 0) {
                            const dataToInsert = expenses.map(row => ({
                                date: row.date || null,
                                house: Number(row.house) || 0,
                                done: Number(row.done) || 0
                            }));

                            const { error: insertError } = await dbClient
                                .from('expenses')
                                .insert(dataToInsert);

                            if (insertError) throw insertError;
                        }
                    }

                    // Always save to localStorage as backup
                    localStorage.setItem('expenseData', JSON.stringify(expenses));

                    showStatus('הנתונים נשמרו בהצלחה!', 'success');
                    hasUnsavedChanges = false;
                    updateSaveButton();
                    
                    if (dbClient) {
                        await loadData();
                    }
                } catch (error) {
                    console.error('Error saving data:', error);
                    showStatus('שגיאה בשמירה לענן. נשמר מקומית במקום.', 'error');
                    localStorage.setItem('expenseData', JSON.stringify(expenses));
                    document.getElementById('saveBtn').disabled = false;
                }
            }

            // Add new row with default house value of 400
            function addRow() {
                const today = new Date().toISOString().split('T')[0];
                expenses.unshift({ date: today, house: '400', done: '' });
                renderTable();
                markAsChanged();
            }

            // Delete row
            function deleteRow(index) {
                if (confirm('האם אתה בטוח שברצונך למחוק שורה זו?')) {
                    expenses.splice(index, 1);
                    renderTable();
                    markAsChanged();
                }
            }

            // Update value
            function updateValue(index, field, value) {
                expenses[index][field] = value;
                renderTable();
                markAsChanged();
            }

            // Mark data as changed
            function markAsChanged() {
                hasUnsavedChanges = true;
                updateSaveButton();
            }

            // Update save button state
            function updateSaveButton() {
                const saveBtn = document.getElementById('saveBtn');
                saveBtn.disabled = !hasUnsavedChanges;
                saveBtn.textContent = hasUnsavedChanges ? '💾 שמור *' : '💾 שמור';
            }

            // Calculate total for a row
            function calculateTotal(row) {
                return (Number(row.house) || 0) + (Number(row.done) || 0);
            }

            // Get all years from data
            function getYearsFromData() {
                const years = new Set();
                expenses.forEach(row => {
                    if (row.date) {
                        const year = new Date(row.date + 'T00:00:00').getFullYear();
                        years.add(year);
                    }
                });
                return Array.from(years).sort((a, b) => b - a);
            }

            // Render table
            function renderTable() {
                const tbody = document.getElementById('tableBody');
                
                if (expenses.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="empty-state">
                                <div>📋</div>
                                <p>אין הוצאות עדיין. לחץ "הוסף שורה" כדי להתחיל.</p>
                            </td>
                        </tr>
                    `;
                    document.getElementById('totals').style.display = 'none';
                    return;
                }

                tbody.innerHTML = '';

                expenses.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    const total = calculateTotal(row);
                    const totalClass = total < 0 ? 'negative' : '';
                    
                    tr.innerHTML = `
                        <td>
                            <button class="btn-delete" onclick="app.deleteRow(${index})">🗑️</button>
                        </td>
                        <td class="${totalClass}">${total}</td>
                        <td>
                            <input type="number" 
                                step="0.01"
                                inputmode="decimal"
                                value="${row.done || ''}" 
                                onchange="app.updateValue(${index}, 'done', this.value)">
                        </td>
                        <td>
                            <input type="number" 
                                step="0.01"
                                inputmode="decimal"
                                value="${row.house || ''}" 
                                onchange="app.updateValue(${index}, 'house', this.value)">
                        </td>
                        <td>
                            <input type="date" 
                                value="${row.date || ''}" 
                                onchange="app.updateValue(${index}, 'date', this.value)">
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                renderTotals();
                if (chartVisible) {
                    renderChart();
                }
            }

            // Render totals with yearly breakdown
            function renderTotals() {
                const totalsDiv = document.getElementById('totals');
                const yearlyData = {};
                let grandTotal = 0;

                // Organize data by year and month
                expenses.forEach(row => {
                    if (row.date) {
                        const date = new Date(row.date + 'T00:00:00');
                        const year = date.getFullYear();
                        const month = date.toLocaleString('he-IL', { month: 'long', year: 'numeric' });
                        const rowTotal = calculateTotal(row);
                        
                        if (!yearlyData[year]) {
                            yearlyData[year] = { total: 0, months: {} };
                        }
                        
                        yearlyData[year].months[month] = (yearlyData[year].months[month] || 0) + rowTotal;
                        yearlyData[year].total += rowTotal;
                        grandTotal += rowTotal;
                    }
                });

                if (Object.keys(yearlyData).length === 0) {
                    totalsDiv.style.display = 'none';
                    return;
                }

                totalsDiv.style.display = 'block';
                let totalsHTML = '';

                // Sort years in descending order
                const sortedYears = Object.keys(yearlyData).sort((a, b) => b - a);

                sortedYears.forEach(year => {
                    const yearData = yearlyData[year];
                    totalsHTML += `<div class="year-section">`;
                    totalsHTML += `<h3>סיכום ${year}</h3>`;
                    
                    Object.entries(yearData.months)
                        .sort((a, b) => new Date(a[0]) - new Date(b[0]))
                        .forEach(([month, total]) => {
                            const totalClass = total < 0 ? 'negative' : '';
                            totalsHTML += `
                                <div class="total-row">
                                    <span>${month}:</span>
                                    <span class="${totalClass}">${total.toFixed(0)}</span>
                                </div>
                            `;
                        });

                    const yearTotalClass = yearData.total < 0 ? 'negative' : '';
                    totalsHTML += `
                        <div class="year-total ${yearTotalClass}">
                            סה"כ ${year}: ${yearData.total.toFixed(0)}
                        </div>
                    `;
                    totalsHTML += `</div>`;
                });

                const grandTotalClass = grandTotal < 0 ? 'negative' : '';
                totalsHTML += `
                    <div class="total-row grand-total ${grandTotalClass}">
                        <span>סה"כ כללי:</span>
                        <span>${grandTotal.toFixed(0)}</span>
                    </div>
                `;

                totalsDiv.innerHTML = totalsHTML;
            }

            // Toggle chart visibility
            function toggleChart() {
                chartVisible = !chartVisible;
                const container = document.getElementById('chartContainer');
                const btn = document.getElementById('chartBtn');
                
                if (chartVisible) {
                    container.style.display = 'block';
                    btn.textContent = '📊 הסתר גרף';
                    renderYearSelector();
                    renderChart();
                } else {
                    container.style.display = 'none';
                    btn.textContent = '📊 גרף';
                }
            }

            // Render year selector
            function renderYearSelector() {
                const years = getYearsFromData();
                const selector = document.getElementById('yearSelector');
                
                if (years.length === 0) {
                    selector.innerHTML = '<p>אין נתונים להצגה</p>';
                    return;
                }
                
                selector.innerHTML = years.map(year => 
                    `<button class="year-btn ${year === selectedYear ? 'active' : ''}" 
                             onclick="app.selectYear(${year})">${year}</button>`
                ).join('');
            }

            // Select year for chart
            function selectYear(year) {
                selectedYear = year;
                renderYearSelector();
                renderChart();
            }

            // Render monthly chart
            function renderChart() {
                const canvas = document.getElementById('monthlyChart');
                const ctx = canvas.getContext('2d');

                // Destroy existing chart
                if (chartInstance) {
                    chartInstance.destroy();
                }

                // Prepare monthly data for selected year
                const monthlyTotals = new Array(12).fill(0);
                const monthNames = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 
                                   'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];

                expenses.forEach(row => {
                    if (row.date) {
                        const date = new Date(row.date + 'T00:00:00');
                        if (date.getFullYear() === selectedYear) {
                            const month = date.getMonth();
                            monthlyTotals[month] += calculateTotal(row);
                        }
                    }
                });

                // Create chart
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: monthNames,
                        datasets: [{
                            label: `סכומים חודשיים ${selectedYear}`,
                            data: monthlyTotals,
                            backgroundColor: monthlyTotals.map(val => val < 0 ? '#ef4444' : '#3b82f6'),
                            borderColor: monthlyTotals.map(val => val < 0 ? '#dc2626' : '#2563eb'),
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                rtl: true,
                                textDirection: 'rtl'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return value.toFixed(0);
                                    }
                                }
                            },
                            x: {
                                ticks: {
                                    font: {
                                        family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto'
                                    }
                                }
                            }
                        }
                    }
                });
            }

            // Send email
            function sendEmail() {
                const csvContent = 'תאריך,בית,בוצע,סה"כ\n' + expenses.map(row => 
                    `${row.date},${row.house},${row.done},${calculateTotal(row)}`
                ).join('\n');
                
                const subject = 'נתוני הוצאות - ' + new Date().toLocaleDateString('he-IL');
                const body = 'להלן נתוני ההוצאות:\n\n' + csvContent;
                const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailtoLink;
            }

            // Warn before leaving with unsaved changes
            window.addEventListener('beforeunload', (e) => {
                if (hasUnsavedChanges) {
                    e.preventDefault();
                    e.returnValue = '';
                }
            });

            // Initialize the app
            loadData();

            // Public API
            return {
                addRow,
                deleteRow,
                updateValue,
                saveData,
                sendEmail,
                toggleChart,
                selectYear
            };
        })();
    </script>
</body>
</html>
